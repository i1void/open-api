<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>404 - Not Found</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
   <style>
      *, *:before, *:after { box-sizing: border-box; }
      body {
         font-family: 'Share Tech Mono', monospace;
         background: #121212; color: #e0e0e0;
         display: flex; justify-content: center; align-items: center;
         text-align: center; min-height: 100vh; margin: 0; padding: 1.5rem;
      }
      .status-code {
         font-size: clamp(5rem, 15vw, 10rem);
         color: #03a9f4;
         text-shadow: 0 0 20px rgba(3,169,244,.4);
      }
      .message { font-size: 1.5rem; margin: .5rem 0 1rem; }
      .explanation { color: #aaa; line-height: 1.6; margin-bottom: 2rem; }
      a {
         display: inline-block; text-decoration: none; color: #000;
         background: #03a9f4; padding: 10px 22px; border-radius: 5px;
         font-weight: bold; transition: background .2s, transform .2s;
      }
      a:hover { background: #4fc3f7; transform: translateY(-2px); }
   </style>
</head>
<body>
   <div>
      <h1 class="status-code">404</h1>
      <p class="message">PAGE NOT FOUND</p>
      <p class="explanation">The page you requested could not be found.</p>
      <a href="/">GO TO HOMEPAGE</a>
   </div>
</body>
</html>
